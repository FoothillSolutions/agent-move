<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentMove</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Base colors */
      --bg-primary: #1a1e38;
      --bg-panel: rgba(18, 20, 40, 0.94);
      --bg-panel-solid: rgba(14, 16, 32, 0.97);
      --accent: #e94560;
      --accent-dim: rgba(233, 69, 96, 0.15);
      --success: #4ade80;
      --success-dim: rgba(74, 222, 128, 0.15);
      --error: #f87171;
      --error-dim: rgba(239, 68, 68, 0.15);

      /* Surface layers (white overlays at different intensities) */
      --surface-1: rgba(255,255,255,0.03);
      --surface-2: rgba(255,255,255,0.04);
      --surface-3: rgba(255,255,255,0.05);
      --surface-4: rgba(255,255,255,0.06);
      --surface-hover: rgba(255,255,255,0.08);
      --surface-active: rgba(255,255,255,0.1);
      --surface-bright: rgba(255,255,255,0.12);

      /* Borders */
      --border-subtle: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.08);
      --border-medium: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.12);

      /* Text colors */
      --text-primary: #fff;
      --text-secondary: #ccc;
      --text-dim: #888;
      --text-muted: #666;
      --text-faint: #555;
      --text-ghost: #444;

      /* Font stack */
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* Spacing */
      --sidebar-width: 360px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary); }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }
    #overlay {
      position: absolute;
      top: 0;
      right: 0;
      width: var(--sidebar-width);
      height: 100%;
      background: rgba(18, 20, 40, 0.94);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255,255,255,0.06);
      color: #ccc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 20px;
      overflow-y: auto;
      z-index: 10;
    }
    #overlay h2 {
      color: #e94560;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .sidebar-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .sidebar-top-row h2 { margin-bottom: 0; }
    .sidebar-top-row > #analytics-btn {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: #888;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
    }
    .sidebar-top-row > #analytics-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar-actions {
      display: flex;
      gap: 4px;
    }
    .sidebar-actions button {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: #888;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
    }
    .sidebar-actions button:hover { background: rgba(255,255,255,0.1); color: #fff; }

    #overlay .agent-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      transition: background 0.2s;
      cursor: pointer;
    }
    #overlay .agent-card:hover {
      background: rgba(255, 255, 255, 0.07);
    }
    #overlay .agent-card .card-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #overlay .agent-card .name {
      font-weight: 600;
      font-size: 13px;
      color: #fff;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .card-kill-btn {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      border-radius: 4px;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .agent-card:hover .card-kill-btn { opacity: 1; }
    .card-kill-btn:hover { background: rgba(248,113,113,0.2); color: #f87171; }
    .sparkline-canvas {
      flex-shrink: 0;
      opacity: 0.7;
    }
    /* Subagent nesting */
    .subagent-group {
      padding-left: 12px;
      margin-left: 4px;
      border-left: 2px solid rgba(171, 71, 188, 0.2);
    }
    .agent-card-child {
      background: rgba(171, 71, 188, 0.04) !important;
      border: 1px solid rgba(171, 71, 188, 0.1) !important;
      font-size: 12px;
    }
    .agent-card-child .name { font-size: 12px; }
    .child-connector {
      color: rgba(171, 71, 188, 0.4);
      font-family: monospace;
      margin-right: 4px;
      font-size: 11px;
    }
    .sub-count {
      background: rgba(171, 71, 188, 0.15);
      color: #ab47bc;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 6px;
      white-space: nowrap;
    }

    /* Collapsible group containers (teams) */
    .agent-group {
      margin-bottom: 4px;
    }
    .group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 8px;
      color: #ddd;
      font-size: 12px;
      font-weight: 600;
      user-select: none;
      transition: background 0.15s, border-color 0.15s;
      border: 1px solid rgba(38, 198, 218, 0.12);
      border-left: 3px solid rgba(38, 198, 218, 0.4);
      background: rgba(38, 198, 218, 0.04);
      margin-bottom: 3px;
    }
    .group-header:hover {
      background: rgba(38, 198, 218, 0.1);
      border-color: rgba(38, 198, 218, 0.25);
      border-left-color: rgba(38, 198, 218, 0.6);
    }
    .group-chevron {
      font-size: 11px;
      color: #26c6da;
      width: 12px;
      text-align: center;
      flex-shrink: 0;
    }
    .group-icon {
      font-size: 14px;
      flex-shrink: 0;
    }
    .group-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #e0e0e0;
    }
    .group-count {
      background: rgba(38, 198, 218, 0.15);
      color: #26c6da;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .group-children {
      padding-left: 14px;
      margin-left: 8px;
      border-left: 2px solid rgba(38, 198, 218, 0.1);
    }

    /* Subagent collapse bar (separate clickable strip below parent card) */
    .sub-collapse-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      margin: -4px 0 4px 3px;
      cursor: pointer;
      border-radius: 0 0 8px 8px;
      color: #ab47bc;
      font-size: 11px;
      font-weight: 500;
      user-select: none;
      transition: background 0.15s, color 0.15s;
      background: rgba(171, 71, 188, 0.05);
      border: 1px solid rgba(171, 71, 188, 0.1);
      border-top: none;
    }
    .sub-collapse-bar:hover {
      background: rgba(171, 71, 188, 0.14);
      color: #ce93d8;
    }
    .sub-collapse-bar.is-collapsed {
      border-radius: 0 0 8px 8px;
      margin-bottom: 6px;
    }
    .sub-collapse-chevron {
      font-size: 10px;
      width: 12px;
      text-align: center;
    }
    .sub-collapse-label {
      letter-spacing: 0.02em;
    }

    #overlay .agent-card .zone {
      color: #999;
      font-size: 12px;
      margin-top: 3px;
    }
    #overlay .agent-card .tool {
      color: #7ab8f5;
      font-size: 12px;
      margin-top: 2px;
    }
    #overlay .agent-card .task-desc {
      color: #c4b5fd;
      font-size: 11px;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: italic;
    }
    #connection-status {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 14px;
      text-align: center;
    }
    .connected { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .disconnected { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

    /* ── Filter Pills ── */
    #filter-pills {
      display: flex;
      gap: 4px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-pill {
      height: 26px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 13px;
      background: rgba(255,255,255,0.04);
      color: #888;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      padding: 0 12px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-pill:hover { background: rgba(255,255,255,0.08); color: #ccc; }
    .filter-pill.active {
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
      border-color: rgba(233, 69, 96, 0.3);
    }
    .filter-zone-select {
      height: 26px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 13px;
      background: rgba(255,255,255,0.04);
      color: #888;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      padding: 0 8px;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    }
    .filter-zone-select:hover { background: rgba(255,255,255,0.08); color: #ccc; }
    .filter-zone-select option { background: #1a1e38; color: #ccc; }

    .filter-badge {
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 8px;
      margin-left: 3px;
    }

    .clean-done-btn {
      height: 26px;
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 13px;
      background: rgba(248, 113, 113, 0.1);
      color: #f87171;
      font-family: var(--font-ui);
      font-size: 11px;
      cursor: pointer;
      padding: 0 10px;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .clean-done-btn:hover {
      background: rgba(248, 113, 113, 0.2);
      border-color: rgba(248, 113, 113, 0.5);
    }

    .agent-card-done {
      background: rgba(255,255,255,0.01) !important;
    }

    /* ── Audio controls ── */
    #audio-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
    }
    #audio-controls button {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: #ccc;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      padding: 0;
      flex-shrink: 0;
    }
    #audio-controls button:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #audio-controls button.muted { color: #f87171; }
    #volume-slider {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      outline: none;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4ade80;
      cursor: pointer;
      border: none;
    }
    #volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4ade80;
      cursor: pointer;
      border: none;
    }
    #volume-label { font-size: 11px; color: #666; min-width: 28px; text-align: right; }

    /* ── Agent Detail Panel ── */
    #agent-detail-panel {
      position: absolute;
      top: 0;
      right: -420px;
      width: 420px;
      height: 100%;
      background: rgba(14, 16, 32, 0.97);
      backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255,255,255,0.08);
      color: #ccc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      z-index: 20;
      transition: right 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #agent-detail-panel.open { right: 0; }
    .detail-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
    }
    .detail-header-buttons {
      position: absolute;
      top: 10px;
      right: 12px;
      display: flex;
      gap: 6px;
    }
    #detail-kill {
      height: 28px;
      border: none;
      background: rgba(248, 113, 113, 0.12);
      border-radius: 6px;
      color: #f87171;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 10px;
    }
    #detail-kill:hover { background: rgba(248, 113, 113, 0.25); color: #fca5a5; }
    #detail-close {
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #detail-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
    #detail-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .detail-role {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(74, 144, 217, 0.2);
      color: #4a90d9;
      margin-left: 6px;
      vertical-align: middle;
    }
    #detail-task {
      margin: 4px 0 6px;
    }
    .detail-task-text {
      color: #c4b5fd;
      font-size: 12px;
      font-style: italic;
      line-height: 1.4;
    }
    #detail-meta { font-size: 11px; color: #666; line-height: 1.6; }
    #detail-meta code { color: #888; background: rgba(255,255,255,0.04); padding: 1px 4px; border-radius: 3px; font-size: 11px; }
    .detail-link {
      color: #ab47bc;
      text-decoration: none;
      border-bottom: 1px dotted rgba(171,71,188,0.4);
      cursor: pointer;
      transition: color 0.15s;
    }
    .detail-link:hover { color: #ce93d8; }
    #detail-stats {
      padding: 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
    }
    .stat-label { color: #666; }
    .stat-value { color: #ccc; text-align: right; }
    .tool-val { color: #7ab8f5; }
    .detail-section-title {
      padding: 10px 18px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #detail-feed {
      flex: 1;
      overflow-y: auto;
      padding: 0 18px 18px;
    }
    .feed-empty { color: #555; font-style: italic; padding: 12px 0; }
    .feed-entry {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 12px;
      line-height: 1.5;
    }
    .feed-time {
      color: #555;
      font-size: 10px;
      font-family: monospace;
      margin-right: 6px;
    }
    .feed-icon { margin-right: 4px; }
    .feed-tool-name { color: #7ab8f5; font-weight: 500; }
    .feed-args {
      color: #666;
      font-size: 11px;
      font-family: monospace;
      margin-top: 2px;
      padding-left: 20px;
      word-break: break-all;
      max-height: 40px;
      overflow: hidden;
    }
    .feed-zone { color: #a0a0a0; }
    .feed-spawn { color: #a855f7; }
    .feed-idle { color: #6b7280; }
    .feed-shutdown { color: #f87171; }
    .feed-tokens { color: #666; }

    /* ── Timeline bar ── */
    #timeline-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 300px;
      height: 52px;
      background: rgba(14, 16, 32, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      z-index: 10;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 0 12px;
      gap: 10px;
      transition: height 0.25s ease;
    }
    .timeline-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .timeline-controls button {
      height: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      padding: 0 8px;
    }
    .timeline-controls button:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #timeline-play { width: 28px; padding: 0; font-size: 11px; }
    #timeline-live {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 0 10px;
    }
    #timeline-live.active {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
      border-color: rgba(74, 222, 128, 0.3);
    }
    #timeline-time {
      font-size: 11px;
      font-family: monospace;
      color: #888;
      min-width: 52px;
    }
    #timeline-speed {
      font-size: 10px;
      color: #666;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    #timeline-speed:hover { color: #ccc; }
    .timeline-track {
      flex: 1;
      height: 32px;
      cursor: pointer;
      position: relative;
    }
    #timeline-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Timeline expanded (swim-lane) mode ── */
    #timeline-bar.expanded {
      height: 200px;
      flex-direction: column;
      padding: 0;
      align-items: stretch;
    }
    #timeline-bar.expanded .timeline-top-bar {
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      height: 36px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    #timeline-bar:not(.expanded) .timeline-top-bar {
      display: contents;
    }
    .timeline-expand-btn {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px;
      background: rgba(255,255,255,0.05);
      color: #888;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
      flex-shrink: 0;
    }
    .timeline-expand-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .timeline-expand-btn.active {
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
      border-color: rgba(233, 69, 96, 0.3);
    }

    /* Event type filter pills in the timeline */
    .timeline-filters {
      display: none;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    #timeline-bar.expanded .timeline-filters {
      display: flex;
    }
    .tl-filter-pill {
      height: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 11px;
      background: rgba(255,255,255,0.04);
      color: #666;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      padding: 0 8px;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .tl-filter-pill:hover { background: rgba(255,255,255,0.07); color: #aaa; }
    .tl-filter-pill.active {
      background: rgba(233, 69, 96, 0.12);
      color: #e94560;
      border-color: rgba(233, 69, 96, 0.2);
    }
    .tl-filter-icon { font-size: 11px; }

    /* Agent filter pills */
    .timeline-agent-filters {
      display: none;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
      margin-left: 4px;
      padding-left: 8px;
      border-left: 1px solid rgba(255,255,255,0.06);
      max-width: 300px;
      overflow-x: auto;
    }
    #timeline-bar.expanded .timeline-agent-filters {
      display: flex;
    }
    .tl-agent-pill {
      height: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: #777;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      cursor: pointer;
      padding: 0 7px;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .tl-agent-pill:hover { background: rgba(255,255,255,0.07); color: #bbb; }
    .tl-agent-pill.active { background: rgba(255,255,255,0.08); color: #ccc; border-color: rgba(255,255,255,0.15); }
    .tl-agent-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Swim-lane track area */
    #timeline-bar.expanded .timeline-track {
      flex: 1;
      height: auto;
      min-height: 0;
    }
    .timeline-swim-labels {
      display: none;
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 60px;
      flex-direction: column;
      pointer-events: none;
      z-index: 2;
    }
    #timeline-bar.expanded .timeline-swim-labels {
      display: flex;
    }
    .swim-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 4px 0 6px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    /* ── Zoom controls ── */
    #zoom-controls {
      position: absolute;
      bottom: 68px;
      left: 20px;
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    #zoom-controls button {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: rgba(18, 20, 40, 0.85);
      backdrop-filter: blur(8px);
      color: #ccc;
      font-size: 18px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      line-height: 1;
      padding: 0;
    }
    #zoom-controls button:hover {
      background: rgba(30, 34, 64, 0.95);
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }
    #zoom-controls button:active {
      background: rgba(40, 44, 74, 1);
    }
    #zoom-controls button svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* ═══════════════════════════════════════════
       FEATURE 2: Command Palette (Cmd+K)
       ═══════════════════════════════════════════ */
    #command-palette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      display: none;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #command-palette.open { display: block; }
    .cmd-backdrop {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }
    .cmd-modal {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 540px;
      max-width: 90vw;
      background: rgba(20, 22, 44, 0.98);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    .cmd-input-wrap {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      gap: 10px;
    }
    .cmd-icon { font-size: 16px; opacity: 0.5; flex-shrink: 0; }
    .cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
    }
    .cmd-input::placeholder { color: #555; }
    .cmd-kbd {
      font-size: 10px;
      font-family: monospace;
      color: #555;
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .cmd-list {
      max-height: 340px;
      overflow-y: auto;
      padding: 6px;
    }
    .cmd-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      gap: 10px;
      transition: background 0.1s;
    }
    .cmd-item:hover, .cmd-item.selected {
      background: rgba(255,255,255,0.06);
    }
    .cmd-item.selected {
      background: rgba(233, 69, 96, 0.12);
      border: 1px solid rgba(233, 69, 96, 0.15);
    }
    .cmd-item-icon { font-size: 16px; flex-shrink: 0; width: 24px; text-align: center; }
    .cmd-item-text { flex: 1; min-width: 0; }
    .cmd-item-label {
      font-size: 13px;
      font-weight: 500;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cmd-item-desc {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cmd-item-cat {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .cmd-empty {
      text-align: center;
      padding: 20px;
      color: #555;
      font-style: italic;
    }
    .cmd-footer {
      display: flex;
      gap: 16px;
      padding: 8px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: #444;
    }
    .cmd-footer kbd {
      font-family: monospace;
      font-size: 10px;
      background: rgba(255,255,255,0.05);
      padding: 1px 4px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.08);
      color: #666;
      margin-right: 4px;
    }

    /* ═══════════════════════════════════════════
       FEATURE 3: Analytics Panel
       ═══════════════════════════════════════════ */
    #analytics-panel {
      position: absolute;
      top: 0;
      left: -400px;
      width: 400px;
      height: 100%;
      background: rgba(14, 16, 32, 0.97);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(255,255,255,0.08);
      color: #ccc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      z-index: 20;
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #analytics-panel.open { left: 0; }
    .analytics-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
    }
    .analytics-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }
    #analytics-close {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #analytics-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
    #analytics-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px 18px;
    }

    /* Analytics Cards */
    .analytics-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .analytics-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 12px;
    }
    .analytics-card.total-cost {
      grid-column: 1 / -1;
      border-color: rgba(233, 69, 96, 0.15);
      background: rgba(233, 69, 96, 0.05);
    }
    .card-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 4px;
    }
    .card-value {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .total-cost .card-value { color: #e94560; }
    .card-unit {
      font-size: 12px;
      font-weight: 500;
      color: #888;
    }
    .card-sub {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    /* Analytics Sections */
    .analytics-section {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 8px;
    }
    .analytics-empty {
      color: #444;
      font-style: italic;
      font-size: 12px;
      padding: 8px 0;
    }

    /* Sparkline */
    .sparkline-container {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .velocity-spark { display: block; margin: 0 auto; }

    /* Agent bar chart */
    .agent-bar { margin-bottom: 8px; }
    .agent-bar-label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
      font-size: 12px;
    }
    .agent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .agent-bar-name {
      flex: 1;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .agent-bar-cost {
      color: #888;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .agent-bar-track {
      height: 6px;
      background: rgba(255,255,255,0.04);
      border-radius: 3px;
      overflow: hidden;
    }
    .agent-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Zone bar chart */
    .zone-bar { margin-bottom: 8px; }
    .zone-bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
      font-size: 12px;
      color: #aaa;
    }
    .zone-bar-cost { color: #666; font-size: 11px; font-variant-numeric: tabular-nums; }
    .zone-bar-track {
      height: 6px;
      background: rgba(255,255,255,0.04);
      border-radius: 3px;
      overflow: hidden;
    }
    .zone-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Cache card */
    .analytics-card.cache-card {
      border-color: rgba(96, 165, 250, 0.2);
      background: rgba(96, 165, 250, 0.05);
    }
    .cache-card .card-value { color: #60a5fa; }
    .cache-savings {
      font-size: 10px;
      color: #4ade80;
      margin-top: 2px;
      font-weight: 500;
    }

    /* Tool usage bars */
    .tool-bar { margin-bottom: 6px; }
    .tool-bar-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
      font-size: 11px;
    }
    .tool-bar-name {
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      font-family: monospace;
      font-size: 11px;
    }
    .tool-bar-count {
      color: #666;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .tool-bar-track {
      height: 5px;
      background: rgba(255,255,255,0.04);
      border-radius: 3px;
      overflow: hidden;
    }
    .tool-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Session duration rows */
    .session-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 12px;
    }
    .session-name {
      flex: 1;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-duration {
      color: #888;
      font-variant-numeric: tabular-nums;
      font-size: 11px;
      flex-shrink: 0;
    }
    .session-status {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .session-status.active {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
    }
    .session-status.idle {
      background: rgba(107, 114, 128, 0.15);
      color: #6b7280;
    }

    /* Threshold */
    .threshold-section {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 12px;
    }
    .threshold-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #888;
    }
    .threshold-row input {
      width: 80px;
      height: 28px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      text-align: center;
      outline: none;
    }
    .threshold-row input:focus { border-color: rgba(233,69,96,0.4); }
    .threshold-status {
      font-size: 11px;
      margin-left: auto;
    }

    /* Cost alert toast */
    #cost-alert {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(220, 38, 38, 0.95);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 10px;
      z-index: 200;
      box-shadow: 0 8px 30px rgba(220,38,38,0.4);
      pointer-events: none;
    }
    #cost-alert.flash {
      animation: alertFlash 0.6s ease-in-out 3;
    }
    @keyframes alertFlash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ═══════════════════════════════════════════
       FEATURE 5: Layout Editor
       ═══════════════════════════════════════════ */

    /* Layout editor toggle — lives inside #zoom-controls, inherits button styles */
    #zoom-controls button.layout-editor-toggle.active {
      background: rgba(233, 69, 96, 0.18);
      color: #e94560;
      border-color: rgba(233, 69, 96, 0.4);
      box-shadow: 0 0 12px rgba(233, 69, 96, 0.15);
    }

    /* Floating editor panel */
    .layout-editor-panel {
      position: absolute;
      bottom: 112px;
      left: 20px;
      background: rgba(14, 16, 32, 0.97);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 14px;
      z-index: 15;
      display: none;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .layout-editor-panel.open {
      display: block;
    }
    .le-title {
      font-size: 12px;
      font-weight: 700;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }
    .le-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .le-buttons button {
      height: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: #ccc;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      padding: 0 10px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .le-buttons button:hover:not(:disabled) {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .le-buttons button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* Overlay root — covers the canvas area */
    .layout-editor-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      display: none;
    }
    .layout-editor-overlay.active {
      display: block;
    }

    /* Per-zone drag handle — transparent overlay so Pixi zone labels show through */
    .zone-drag-handle {
      position: absolute;
      border: 2px dashed rgba(233, 69, 96, 0.5);
      border-radius: 6px;
      background: transparent;
      pointer-events: auto;
      cursor: grab;
      transition: border-color 0.15s, background 0.15s;
      box-sizing: border-box;
    }
    .zone-drag-handle:hover {
      border-color: rgba(233, 69, 96, 0.8);
      background: rgba(233, 69, 96, 0.05);
    }
    .zone-drag-handle.dragging {
      border-color: rgba(233, 69, 96, 1);
      background: rgba(233, 69, 96, 0.08);
      cursor: grabbing;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
    }

    /* Zone label inside drag handle — positioned at bottom-left to avoid covering the Pixi zone label */
    .zone-handle-label {
      position: absolute;
      bottom: 22px;
      left: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      color: rgba(233, 69, 96, 0.85);
      pointer-events: none;
      background: rgba(14, 16, 32, 0.8);
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
    }

    /* Size indicator */
    .zone-handle-size {
      position: absolute;
      bottom: 6px;
      left: 8px;
      font-family: monospace;
      font-size: 10px;
      color: rgba(233, 69, 96, 0.6);
      pointer-events: none;
      background: rgba(14, 16, 32, 0.8);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* Corner resize handles */
    .zone-resize-handle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: rgba(233, 69, 96, 0.7);
      border: 1px solid rgba(233, 69, 96, 1);
      border-radius: 2px;
      pointer-events: auto;
      z-index: 1;
      transition: background 0.1s, transform 0.1s;
    }
    .zone-resize-handle:hover {
      background: rgba(233, 69, 96, 1);
      transform: scale(1.3);
    }
    .zone-resize-tl { top: -6px; left: -6px; cursor: nwse-resize; }
    .zone-resize-tr { top: -6px; right: -6px; cursor: nesw-resize; }
    .zone-resize-bl { bottom: -6px; left: -6px; cursor: nesw-resize; }
    .zone-resize-br { bottom: -6px; right: -6px; cursor: nwse-resize; }

    /* ═══════════════════════════════════════════
       Stats HUD — always-visible compact bar
       ═══════════════════════════════════════════ */
    #stats-hud {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(14, 16, 32, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 6px 14px;
      z-index: 12;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-secondary);
      user-select: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .hud-val {
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .hud-unit {
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 500;
    }
    .hud-icon {
      font-size: 12px;
      color: var(--text-dim);
    }
    .hud-bolt {
      font-size: 11px;
    }
    .hud-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .hud-dot.active {
      background: var(--success);
    }
    .hud-dot.active.pulse {
      animation: hudPulse 2s ease-in-out infinite;
    }
    .hud-dot.idle {
      background: var(--text-muted);
    }
    .hud-sep {
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.08);
      margin: 0 10px;
      flex-shrink: 0;
    }
    @keyframes hudPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
      50% { box-shadow: 0 0 0 4px rgba(74, 222, 128, 0); }
    }

    /* ═══════════════════════════════════════════
       Focus Mode Indicator
       ═══════════════════════════════════════════ */
    #focus-indicator {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(-60px);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(14, 16, 32, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 10px;
      padding: 8px 16px;
      z-index: 15;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-secondary);
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.15);
      user-select: none;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    }
    #focus-indicator.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .fi-icon {
      font-size: 14px;
    }
    .fi-name {
      font-weight: 700;
      color: var(--accent);
    }
    .fi-hint {
      font-size: 10px;
      color: var(--text-dim);
      margin-left: 8px;
      padding-left: 8px;
      border-left: 1px solid rgba(255,255,255,0.1);
    }
    @keyframes focusPulse {
      0%, 100% { border-color: rgba(233, 69, 96, 0.3); }
      50% { border-color: rgba(233, 69, 96, 0.6); }
    }
    #focus-indicator.visible {
      animation: focusPulse 2s ease-in-out infinite;
    }

    /* ═══════════════════════════════════════════
       Toast Notifications
       ═══════════════════════════════════════════ */
    #toast-container {
      position: fixed;
      bottom: 68px;
      left: 12px;
      display: flex;
      flex-direction: column-reverse;
      gap: 6px;
      z-index: 50;
      pointer-events: none;
      max-width: 320px;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(14, 16, 32, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 16px;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-secondary);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      pointer-events: auto;
      opacity: 0;
      transform: translateX(-20px);
      white-space: nowrap;
    }
    .toast strong {
      color: #fff;
      font-weight: 600;
    }
    .toast-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .toast-enter {
      animation: toastIn 0.3s ease forwards;
    }
    .toast-exit {
      animation: toastOut 0.3s ease forwards;
    }
    .toast-spawn {
      border-left: 3px solid #a855f7;
    }
    .toast-done {
      border-left: 3px solid var(--success);
    }
    .toast-shutdown {
      border-left: 3px solid var(--error);
    }
    .toast-info {
      border-left: 3px solid #60a5fa;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(-20px); }
    }

    /* ═══════════════════════════════════════════
       Keyboard Shortcuts Help Overlay
       ═══════════════════════════════════════════ */
    #shortcuts-help {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      display: none;
      font-family: var(--font-ui);
    }
    #shortcuts-help.open { display: block; }
    .sh-backdrop {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }
    .sh-modal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      max-width: 90vw;
      max-height: 80vh;
      background: rgba(20, 22, 44, 0.98);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;

    }
    .sh-header {

      justify-content: space-between;

      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sh-title {
      font-size: 15px;

      color: #fff;
    }
    .sh-close {
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      color: #888;
      font-size: 18px;

    }
    .sh-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .sh-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .sh-group {
      margin-bottom: 18px;
    }
    .sh-group:last-child { margin-bottom: 0; }
    .sh-group-title {
      font-size: 10px;
      font-weight: 700;

    }
    .sh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .sh-row:last-child { border-bottom: none; }
    .sh-keys {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .sh-keys kbd {
      font-family: 'Inter', monospace;
      font-size: 11px;
      font-weight: 500;
      background: rgba(255,255,255,0.08);

      border: 1px solid rgba(255,255,255,0.1);
      min-width: 24px;
      text-align: center;
    }
    .sh-desc {
      font-size: 13px;
      color: #aaa;
      text-align: right;
    }
    .sh-footer {
      padding: 10px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: #555;
      text-align: center;
    }
    .sh-footer kbd {
      font-family: monospace;
      font-size: 10px;
      background: rgba(255,255,255,0.05);
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.08);
      color: #777;
    }

    /* ═══════════════════════════════════════════
       Session Export Modal
       ═══════════════════════════════════════════ */
    #session-export {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 100;
      display: none;
      font-family: var(--font-ui);
    }
    #session-export.open { display: block; }
    .se-backdrop {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }
    .se-modal {

      width: 600px;
      max-width: 90vw;
      max-height: 80vh;

      border-radius: 14px;

    }
    .se-header {
      display: flex;
      align-items: center;

    .se-title {

    .se-close {
      width: 28px; height: 28px;
      border: none;

      font-size: 18px;

    .se-body {
      flex: 1;

      padding: 16px 20px;
    }
    .se-content {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #bbb;
      white-space: pre-wrap;

    .se-footer button {

    }

    /* ═══════════════════════════════════════════
       Onboarding Overlay
       ═══════════════════════════════════════════ */
    #onboarding {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;

    }
    #onboarding.ob-enter { opacity: 1; }
    #onboarding.ob-exit {
      opacity: 0;
      pointer-events: none;
    }
    .ob-card {

</head>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
