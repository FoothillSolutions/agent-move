<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentMove — Live AI Agent Activity Monitor</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="description" content="Watch your AI agents work in real-time with pixel-art visualizations. Monitor Claude Code sessions, tool usage, and agent activity live." />
  <meta name="theme-color" content="#1a1e38" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <div id="overlay">
      <div class="sidebar-top-row">
        <h2>
          <svg class="logo-icon" viewBox="0 0 32 32" width="20" height="20" style="margin-right:6px;vertical-align:-3px;">
            <defs><linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#e94560"/><stop offset="100%" style="stop-color:#c23152"/></linearGradient></defs>
            <rect width="32" height="32" rx="6" fill="url(#logo-bg)"/>
            <g fill="#fff"><rect x="12" y="5" width="8" height="8" rx="1"/><rect x="14" y="8" width="2" height="2" fill="#1a1e38"/><rect x="18" y="8" width="2" height="2" fill="#1a1e38"/><rect x="13" y="14" width="6" height="7" rx="1"/><rect x="9" y="15" width="4" height="2" rx="1"/><rect x="19" y="15" width="4" height="2" rx="1"/><rect x="13" y="22" width="2" height="4" rx="1"/><rect x="17" y="22" width="2" height="4" rx="1"/></g>
            <path d="M24 22 L27 25 L24 28" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
          </svg>
          AgentMove
        </h2>
        <div class="sidebar-actions">
          <button id="analytics-btn" title="Analytics (A)">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/></svg>
          </button>
          <button id="leaderboard-btn" title="Leaderboard (L)">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><path d="M12 6l1.5 3.5L17 11l-3.5 1.5L12 16l-1.5-3.5L7 11l3.5-1.5z"/></svg>
          </button>
          <button id="cmd-hint" title="Command Palette (Ctrl+K)">&#8984;K</button>
        </div>
      </div>
      <div id="connection-status" class="disconnected">Disconnected</div>
      <div id="audio-controls">
        <button id="mute-btn" title="Toggle Sound">&#128264;</button>
        <input type="range" id="volume-slider" min="0" max="100" value="30" />
        <span id="volume-label">30%</span>
      </div>
      <div id="agent-list"></div>
    </div>
    <div id="zoom-controls">
      <button id="zoom-in" title="Zoom In">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
      <button id="zoom-out" title="Zoom Out">
        <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
      </button>
      <button id="zoom-reset" title="Fit to View">
        <svg viewBox="0 0 24 24"><path d="M3 5v4h2V5h4V3H5a2 2 0 00-2 2zm2 10H3v4a2 2 0 002 2h4v-2H5v-4zm14 4h-4v2h4a2 2 0 002-2v-4h-2v4zm0-16h-4v2h4v4h2V5a2 2 0 00-2-2z"/></svg>
      </button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
