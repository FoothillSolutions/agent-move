<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1e38; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }
    #overlay {
      position: absolute;
      top: 0;
      right: 0;
      width: 300px;
      height: 100%;
      background: rgba(18, 20, 40, 0.94);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255,255,255,0.06);
      color: #ccc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 20px;
      overflow-y: auto;
      z-index: 10;
    }
    #overlay h2 {
      color: #e94560;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #overlay .agent-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    #overlay .agent-card:hover {
      background: rgba(255, 255, 255, 0.07);
    }
    #overlay .agent-card .name {
      font-weight: 600;
      font-size: 13px;
      color: #fff;
    }
    #overlay .agent-card .zone {
      color: #999;
      font-size: 12px;
      margin-top: 3px;
    }
    #overlay .agent-card .tool {
      color: #7ab8f5;
      font-size: 12px;
      margin-top: 2px;
    }
    #connection-status {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 14px;
      text-align: center;
    }
    .connected { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .disconnected { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
  </style>
</head>
<body>
  <div id="app">
    <div id="overlay">
      <h2>AgentFlow</h2>
      <div id="connection-status" class="disconnected">Disconnected</div>
      <div id="agent-list"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
